[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate core 0001 --fake --noinput && python manage.py migrate --fake-initial --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
